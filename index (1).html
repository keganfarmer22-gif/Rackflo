<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rackflo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0a0a0a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo-mark {
      width: 64px;
      height: 64px;
      background: #ffffff;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo-mark svg {
      width: 38px;
      height: 38px;
    }

    .wordmark {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.5px;
      color: #ffffff;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: 14px;
      color: #666666;
      letter-spacing: 0.5px;
      margin-bottom: 48px;
    }

    .contact-link {
      color: #ffffff;
      text-decoration: none;
      font-size: 14px;
      border-bottom: 1px solid #333;
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    .contact-link:hover {
      border-color: #ffffff;
    }

    footer {
      position: fixed;
      bottom: 32px;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="logo-mark">
    <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="6" y="6" width="6" height="26" rx="2" fill="#0a0a0a"/>
      <rect x="6" y="6" width="22" height="6" rx="2" fill="#0a0a0a"/>
      <rect x="6" y="16" width="18" height="6" rx="2" fill="#0a0a0a"/>
      <rect x="20" y="22" width="6" height="12" rx="2" fill="#0a0a0a" transform="rotate(35 23 28)"/>
    </svg>
  </div>

  <div class="wordmark">rackflo</div>
  <div class="tagline">rackflo.com</div>

  <a href="mailto:partners@rackflo.com" class="contact-link">partners@rackflo.com</a>

  <footer>We're building something.</footer>

</body>
</html>
